version: '3.9'
services:
  mongo:
    image: mongo:7.0
    container_name: vehicle-reservation-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: vehicle-reservation-api
    depends_on:
      - mongo
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/vehicle-reservation
      - JWT_SECRET=changemeinprod
      - JWT_EXPIRES_IN=3600s
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    command: npm run start:dev

volumes:
  mongo_data:
